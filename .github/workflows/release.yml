# Builds Keyport for Windows + Linux and attaches the installers to a GitHub
# Release. Triggered by pushing a version tag, e.g.:
#
#     git tag v0.1.0
#     git push origin v0.1.0
#
# Produces a DRAFT release you review and publish. Downloads:
#   • Windows — Keyport_<ver>_x64-setup.exe   (NSIS installer)
#   • Linux   — .deb, .AppImage, .rpm
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # allow manual runs (use a tag ref)

# Needed so the action can create the GitHub Release.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--bundles nsis" # just the .exe installer on Windows
          - platform: ubuntu-22.04
            args: "" # deb + rpm + AppImage (built oldest-supported for glibc compat)

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            rpm \
            xdg-utils

      # No frontend install step: Keyport's UI is static HTML/CSS/JS (no npm).
      - name: Build the app and publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: "Keyport ${{ github.ref_name }}"
          releaseBody: |
            Download the installer for your OS below.

            - **Windows:** `Keyport_*_x64-setup.exe` (per-user install, no admin).
            - **Linux:** `.deb` (Debian/Ubuntu), `.AppImage` (portable), or `.rpm` (Fedora).
              Needs WebKitGTK + `xdg-utils`; works best on an X11 session.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
